<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
    <script src="js.js" defer></script>
    <link rel="stylesheet" href="styles.css">
<body>
    <div class="calc">
        <div class="screen">
            <div class="bigScreen"></div>
            <div class="smallScreen"></div>
        </div>
            <div class="buttons">
                <div class="top AC">AC</div>
                <div class="top paranthese">( )</div>
                <div class="top pourcentage">%</div>
                <div class="orange division">÷</div>
                <div>7</div>
                <div>8</div>
                <div>9</div>
                <div class="orange multiplication">×</div>
                <div>4</div>
                <div>5</div>
                <div>6</div>
                <div class="orange signe">-</div>
                <div>1</div>
                <div>2</div>
                <div>3</div>
                <div class="orange signe">+</div>
                <div>0</div>
                <div class="dot">.</div>
                <div class="return">⬅</div>
                <div class="orange answer">=</div>
        </div>
    </div>
</body>
</html>
